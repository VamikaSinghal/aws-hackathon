# Pure mutual-TLS deployment: no identity provider, no human login.
# Only a request presenting a client certificate signed by our CA (certs/ca.crt) is let through
# to the protected actions upstream. Certs are generated by infra/pomerium/generate-certs.sh.
address: :8443
certificate_file: /pomerium/certs/server.crt
certificate_key_file: /pomerium/certs/server.key

downstream_mtls:
  ca_file: /pomerium/certs/ca.crt
  enforcement: policy

routes:
  - from: https://adaptive-health-actions.localhost.pomerium.io:8443
    to: http://host.docker.internal:8788
    policy:
      - allow:
          or:
            - client_certificate:
                fingerprint: 1f62c49c525419cd89cde4f30db0b0dd24ac988c75b70de1c7608237e9cab322
